<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>삼성생명 통합치매 치료비 상담신청</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Noto Sans KR',sans-serif;background:#fff;font-size:14px;}.top-bar{background:linear-gradient(135deg,#1e5cb3,#4f8ef7);color:#fff;padding:14px 18px;font-size:14px;font-weight:700;text-align:center;}.sec{padding:20px 18px;border-bottom:6px solid #f4f4f4;}.sec-t{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:18px;}.field{display:flex;align-items:flex-start;margin-bottom:16px;}.fl{width:90px;font-size:14px;color:#333;padding-top:10px;flex-shrink:0;font-weight:500;}.fi{flex:1;}.fi input,.fi select{width:100%;border:1px solid #ddd;border-radius:4px;padding:9px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;}.fi input:focus,.fi select:focus{border-color:#1e5cb3;}.rr{display:flex;gap:18px;padding-top:8px;}.rr label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;}.rr input{accent-color:#1e5cb3;width:16px;height:16px;}.pr{display:flex;align-items:center;gap:5px;}.pr select{border:1px solid #ddd;border-radius:4px;padding:9px 6px;font-size:14px;background:#fff;font-family:'Noto Sans KR',sans-serif;width:72px;flex-shrink:0;text-align:center;}.pr input{flex:1;min-width:0;border:1px solid #ddd;border-radius:4px;padding:9px 10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;text-align:center;font-weight:600;letter-spacing:2px;}.pr span{color:#aaa;font-size:16px;}.fi textarea{width:100%;border:1px solid #ddd;border-radius:4px;padding:9px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;min-height:80px;resize:none;line-height:1.6;}.psec{padding:20px 18px;}.pt{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:10px;}.pd{font-size:12px;color:#555;line-height:1.7;margin-bottom:18px;}.pd a{color:#1565c0;}.pg{margin-bottom:16px;}.pgh{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;}.pgh span{font-size:13px;color:#333;line-height:1.5;}.ab{background:#1a1a1a;color:#fff;border:none;border-radius:4px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;flex-shrink:0;min-width:90px;}.pi{border-top:1px solid #e0e0e0;}.pit{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0;}.pit label{font-size:13px;color:#333;}.rb{display:flex;align-items:center;gap:4px;font-size:13px;color:#555;cursor:pointer;}.rb input{accent-color:#1e5cb3;width:15px;height:15px;}.sub-area{padding:20px 18px 40px;}.sub-btn{width:100%;background:linear-gradient(135deg,#1e5cb3,#4f8ef7);color:#fff;border:none;border-radius:10px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center;z-index:999;padding:20px;}.modal.show{display:flex;}.mbox{background:#fff;border-radius:16px;padding:28px 24px;text-align:center;max-width:300px;width:100%;}.mbox .ico{font-size:40px;margin-bottom:12px;}.mbox h3{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}.mbox p{font-size:13px;color:#666;line-height:1.6;}.mbox button{margin-top:18px;width:100%;background:linear-gradient(135deg,#1e5cb3,#4f8ef7);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}</style></head><body>
<div class="top-bar">🎯 삼성생명 — 통합치매 치료비 상담신청</div>
<form id="cf" action="" method="" onsubmit="return hs(event)">

<input type="hidden" name="상품명" value="통합치매 치료비"><input type="hidden" name="담당자" value="양금남 (삼성생명)">
<div class="sec"><div class="sec-t">상담 신청 정보 입력</div>
<div class="field"><div class="fl">이름</div><div class="fi"><input type="text" name="이름" placeholder="홍길동" required></div></div>
<div class="field"><div class="fl">성별</div><div class="fi"><div class="rr"><label><input type="radio" name="성별" value="남성" checked> 남성</label><label><input type="radio" name="성별" value="여성"> 여성</label></div></div></div>
<div class="field"><div class="fl">생년월일</div><div class="fi"><input type="text" name="생년월일" placeholder="19900101" maxlength="8"></div></div>
<div class="field"><div class="fl">연락처</div><div class="fi"><div class="pr"><select name="통신사"><option>010</option><option>011</option><option>016</option><option>017</option><option>019</option></select><span>-</span><input type="tel" name="중간번호" maxlength="4"><span>-</span><input type="tel" name="끝번호" maxlength="4"></div></div></div>
<div class="field"><div class="fl">문의내용</div><div class="fi"><textarea name="문의내용" placeholder="통합치매 치료비에 대해 궁금한 점을 입력하십시오."></textarea></div></div>
</div>
<div class="psec"><div class="pt">개인정보 수집 및 활용 동의</div>
<div class="pd">귀하는 본 동의를 거부할 수 있으나, 거부 시 상담 신청이 불가능합니다. 연락중지청구시스템(<a href="https://www.donotcall.or.kr" target="_blank">www.donotcall.or.kr</a>)을 통해 언제든지 철회를 요청할 수 있습니다.</div>
<div class="pg"><div class="pgh"><span>[필수] 개인정보 수집 및 활용 동의</span><button type="button" class="ab" onclick="aa('r')">전체동의</button></div>
<div class="pi">
<div class="pit"><label>개인정보의 수집 및 이용동의</label><label class="rb"><input type="checkbox" id="c1" name="개인정보수집이용" required> 동의</label></div>
<div class="pit"><label>개인정보 위탁 및 제공동의</label><label class="rb"><input type="checkbox" id="c2" name="개인정보위탁제공" required> 동의</label></div>
<div class="pit"><label>상담을 위한 연락 동의</label><label class="rb"><input type="checkbox" id="c3" name="연락동의" required> 동의</label></div>
</div></div>
<div class="pg" style="margin-top:8px"><div class="pgh"><span>[선택] 마케팅 정보 수신 동의</span><button type="button" class="ab" onclick="aa('o')">전체동의</button></div>
<div class="pi">
<div class="pit"><label>이메일 마케팅 정보 수신</label><label class="rb"><input type="checkbox" id="c4" name="마케팅이메일"> 동의</label></div>
<div class="pit"><label>SMS 마케팅 정보 수신</label><label class="rb"><input type="checkbox" id="c5" name="마케팅SMS"> 동의</label></div>
</div></div></div>
<div class="sub-area"><button type="submit" class="sub-btn">📨 상담 신청하기</button></div>
</form>
<div class="modal" id="dm"><div class="mbox"><div class="ico">✅</div><h3>상담 신청 완료!</h3><p>양금남 담당자가<br>빠른 시일 내 연락드리겠습니다.<br><br>📞 010-8116-2513</p><button onclick="document.getElementById('dm').classList.remove('show')">확인</button></div></div>
<script>function aa(t){if(t==='r'){['c1','c2','c3'].forEach(id=>document.getElementById(id).checked=true);}else{['c4','c5'].forEach(id=>document.getElementById(id).checked=true);}}function hs(e){if(!['c1','c2','c3'].every(id=>document.getElementById(id).checked)){alert('[필수] 개인정보 동의 항목을 확인하십시오.');return false;}e.preventDefault();document.getElementById('dm').classList.add('show');return false;}</script>
</body></html>
